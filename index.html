<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">

	<meta name="textonome" content="text based audio player built with html5 css3 and javascript">

	<title>RadioOn v 1.0.0.2</title>
	<!-- <link rel="stylesheet" href="css/style.css"> -->

	<link id="styleSheet" rel="stylesheet" href="css/style.css">
	<link href="https://pvinis.github.io/iosevka-webfont/3.4.1/iosevka.css" rel="stylesheet" />
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>
	<div class="header">
		
		<div class="title-logo">Radio On</div>
		<div id="block_right">
			<ul>
				<li><div id="changeTheme">[SWITCH-THEME]</div></li>
				<li><div>	<button id="sleepTimerBtn">Set Sleep Timer</button></div></li>
				<!-- <input type="text" id="searchInput" placeholder="Поиск станции..." /> -->
			</ul>
			
			
		</div>
	
	</div>

	<!-- CONTROL -->

	<div class="container">
<div class="control_bloks">
		<div class="control">
			<div id="text-controls">
				<span id="playBtn" class="txt-btn">Play</span>
				<!-- <span id="pauseBtn" class="txt-btn">Pause</span> -->
				<span id="stopBtn" class="txt-btn">Stop</span>
			</div>
			<div id="volumeControl">
				<input type="range" id="volumeRange" min="0" max="100" step="1" value="100">
				<div>Value: <span id="val_lvl">100</span></div>
			</div>
		</div>
		<div class="Audio-Title">
	<div class="Audio_TItle_Station">
		<div class="Audio_title-Station_Now">Statiuon Now:</div>
		<div id="currentTitle"></div>
	</div>
			<!-- <div class="Audio-Title-Play">Play Now:</div> -->
			<div id="Audio-Title-Play-title-API">
				<div id="currentSong">Now playing:</div>
			</div>
			<audio id="audioPlayer" controls style="width: 100%;"></audio>
		</div>
</div>

<!-- CATEGORIES AND STATIONS -->

<div class="category-selector">
	<h2>Select a category:</h2>
	<ul>
			<li><a href="#" data-category="all">All</a></li>
			<li><a href="#" data-category="pop">Pop</a></li>
			<li><a href="#" data-category="Rok">Rok</a></li>
			<li><a href="#" data-category="Relax">Relax</a></li>
			<li><a href="#" data-category="LoFi">LoFi</a></li>
			<!-- <li><a href="#" data-category="Категория 3">Категория 3</a></li> -->
			<!-- Добавьте здесь дополнительные категории -->
	</ul>
</div>

		<!-- PlayList -->

		<div class="playList-container">
			
		

			<div id="TrackList" class="playlist custom-playlist" >
				<h2 class="playlist-title">My PlayLists</h2>
				<ul class="station-list">
					<li><a href="#" LIst="РВВ" data-stream="Руки Вверх">Руки Вверх</a></li>
					<li><a href="#" list="Tyrok" data-stream="Tyrok" data-title="Tyrk">Турк Music</a></li>
				</ul>
			</div>

			<div class="playlist custom-playlist" >
				<h2 class="playlist-title">My Hits</h2>
				<ul class="station-list">
					
					<li><a href="#" list="MyHit" data-stream="Tyrok" data-title="Tyrk">My Best</a></li>
				</ul>
			</div>

</div>
</div>
	</div>
	</div>
	<script src="js/main.js"></script>
	<script src="js/test.js"></script>
	<!-- <script src="js/audioFunctions.js"></script> -->

</body>
<script>
	(function() {
		var switchThemeBtn = document.getElementById('changeTheme'),
			styleTag = document.getElementById('styleSheet'),
			cssFiles = [
				"css/style.css",
				"css/white.css",
				"css/gruvbox.css",
				"css/amber.css",
			],
			index = 0;
		switchThemeBtn.onclick = function() {
			if (index < (cssFiles.length - 1)) {
				index += 1;
				styleTag.href = cssFiles[index];
			} else {
				index = 0;
				styleTag.href = cssFiles[index];
			}
		};
	})();
	$(document).on('input', '#volumeRange', function() {
        var volumeValue = parseInt(this.value); // Получите значение ползунка как целое число
        if (volumeValue >= 0 && volumeValue <= 100) {
            audioPlayer.volume = volumeValue / 100; // Установите громкость
        }
        // Теперь вы можете обновить значение на странице
        var output = document.getElementById("val_lvl");
        output.innerHTML = volumeValue;
    });

    // Скрыть элемент <audio>
    // document.getElementById('audioPlayer').style.display = 'none'; // если нужно скрыть


</script>

</html>
