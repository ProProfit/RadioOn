<body>

	<!-- CONTROL -->

	<div class="container">
<div class="control_bloks">

				<!-- <span id="pauseBtn" class="txt-btn">Pause</span> -->
				<span id="stopBtn" class="txt-btn">Stop</span>
			</div>
			<div id="volumeControl">
				<input type="range" id="volumeRange" min="0" max="100" step="1" value="100">

		</div>
		<div class="Audio-Title">
	<div class="Audio_TItle_Station">

		<div id="currentTitle"></div>
	</div>
			<!-- <div class="Audio-Title-Play">Play Now:</div> -->
			<div id="Audio-Title-Play-title-API">
				<div id="currentSong">Now playing:</div>
			</div>
			<audio id="audioPlayer" controls style="width: 100%;"></audio>
		</div>
</div>

<!-- CATEGORIES AND STATIONS -->

<div class="category-selector">
	<h2>Select a category:</h2>
	<ul>
	</ul>
</div>

		<!-- PlayList -->

		<div class="playList-container">

</div>
</div>
	</div>
	</div>

	<script src="js/test.js"></script>

<div id="privateModal" class="hidden">
  <div id="privateModalInner">
    <h3>Private Playlists</h3>
    <div id="privateLoginForm">
      <input type="password" id="privatePat" placeholder="GitHub PAT (ghp_…)">
      <div class="modal-actions">
        <button id="privateLoginBtn">[ Войти ]</button>
      </div>
    </div>
    <div class="modal-actions hidden" id="privateLogoutRow">
      <button id="privateLogoutBtn">[ Выйти ]</button>
    </div>
    <div class="modal-actions" style="margin-top:10px;">
      <button id="privateCloseBtn">[ Закрыть ]</button>
    </div>
  </div>
</div>
</body>
<script>
	(function() {
		var switchThemeBtn = document.getElementById('changeTheme'),
			styleTag = document.getElementById('styleSheet'),
			cssFiles = [
				"css/style.css",
				"css/white.css",
				"css/gruvbox.css",
				"css/amber.css",
			],
			index = parseInt(localStorage.getItem('themeIndex') || '0', 10);

		styleTag.href = cssFiles[index];

		switchThemeBtn.onclick = function() {
			index = index < cssFiles.length - 1 ? index + 1 : 0;
			styleTag.href = cssFiles[index];
			localStorage.setItem('themeIndex', index);
		};
	})();
	$(document).on('input', '#volumeRange', function() {
        var volumeValue = parseInt(this.value); // Получите значение ползунка как целое число
        if (volumeValue >= 0 && volumeValue <= 100) {
            audioPlayer.volume = volumeValue / 100; // Установите громкость
        }
        // Теперь вы можете обновить значение на странице
        var output = document.getElementById("val_lvl");
        output.innerHTML = volumeValue;
    });

    // Скрыть элемент <audio>
    // document.getElementById('audioPlayer').style.display = 'none'; // если нужно скрыть


</script>

</html>
